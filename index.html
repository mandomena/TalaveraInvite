  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#3a2a1a; font-family:'Cormorant Garamond',serif; color:#f0e6d6;
    display:flex; flex-direction:column; align-items:center; min-height:100vh;
    padding:22px 12px 60px;
  }

  /* ---------- Toolbar ---------- */
  .toolbar{ width:min(100%,760px); display:flex; flex-direction:column; gap:12px;
    align-items:center; margin-bottom:22px; }
  .toolbar .group{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:center; }
  .toolbar label{ display:flex; align-items:center; gap:7px; font:600 14px/1 'Cormorant Garamond',serif;
    letter-spacing:.03em; color:#e8d6bf; }
  .toolbar input[type=color]{ width:34px; height:26px; border:1px solid #00000040; border-radius:5px;
    background:none; cursor:pointer; padding:0; }
  .toolbar input[type=range]{ width:150px; accent-color:#c98b4a; cursor:pointer; }
  .toolbar button{ font:600 14px/1 'Cormorant Garamond',serif; letter-spacing:.04em;
    background:#a9682f; color:#fff; border:none; border-radius:6px; padding:9px 15px; cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.3); }
  .toolbar button:hover{ filter:brightness(1.1); }
  .presets{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .swatch{ width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid #ffffff55;
    position:relative; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.35); }
  .swatch i{ position:absolute; inset:0; }
  .swatch i:first-child{ clip-path:polygon(0 0,100% 0,0 100%); }
  .swatch i:last-child{ clip-path:polygon(100% 0,100% 100%,0 100%); }
  .hint{ font-size:14px; color:#d8c4ab; text-align:center; }

  /* ---------- Card ---------- */
  .card{
    position:relative; width:var(--card-w); aspect-ratio:704 / 994;
    background:var(--bg); container-type:inline-size;
    box-shadow:0 14px 40px rgba(0,0,0,.45);
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .deco{
    position:absolute; inset:0; background:var(--accent);
    -webkit-mask-image:var(--mask); mask-image:var(--mask);
    -webkit-mask-size:100% 100%; mask-size:100% 100%;
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
    pointer-events:none;
  }

  .line{
    position:absolute; left:50%; transform:translate(-50%,-50%);
    width:86%; text-align:center; color:var(--accent);
    white-space:nowrap; outline:none; line-height:1;
  }
  .line[contenteditable]:hover{ box-shadow:0 0 0 1px rgba(255,255,255,.28); border-radius:3px; }
  .line[contenteditable]:focus{ box-shadow:0 0 0 1px rgba(255,255,255,.75); border-radius:3px; }
  .script{ font-family:'Pinyon Script',cursive; font-weight:400; }
  .caps{ font-family:'Cinzel',serif; }

  #l1{top:24.95%;font-size:5.0cqw;}
  #l2{top:32.7%;font-size:8.16cqw;font-weight:600;letter-spacing:.02em;}
  #l3{top:41.15%;font-size:9.25cqw;}
  #l4{top:50.0%;font-size:10.0cqw;font-weight:600;letter-spacing:.06em;}
  #l5{top:58.05%;font-size:3.5cqw;font-weight:500;letter-spacing:.05em;}
  #l6{top:62.27%;font-size:3.5cqw;font-weight:500;letter-spacing:.05em;}
  #l7{top:66.4%;font-size:4.3cqw;}
  #l8{top:69.8%;font-size:4.3cqw;}
  #l9{top:74.0%;font-size:4.3cqw;}

  @page{ size:auto; margin:0; }
  @media print{
    body{ background:#fff; padding:0; }
    .toolbar{ display:none; }
    .card{ box-shadow:none; width:100vw; max-width:none; }
    .line[contenteditable]:hover,.line[contenteditable]:focus{ box-shadow:none; }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <div class="group">
      <label>Background <input type="color" id="bgColor" value="#bb7737"></label>
      <label>Pattern &amp; text <input type="color" id="fgColor" value="#fbf6ec"></label>
      <label>Quick hue <input type="range" id="hue" min="0" max="360" value="32"></label>
    </div>
    <div class="presets" id="presets"></div>
    <div class="group">
      <button id="printBtn">&#128424;&#65039; Print / Save as PDF</button>
      <button id="resetBtn">&#8634; Reset</button>
    </div>
    <span class="hint">Click any line to edit it &middot; pick any colors above &middot; everything saves automatically in this browser.</span>
  </div>

  <div class="card" id="card">
    <div class="deco"></div>
    <div class="line script" id="l1" contenteditable="true">please join us for</div>
    <div class="line caps"   id="l2" contenteditable="true">MELISSA&#39;S</div>
    <div class="line script" id="l3" contenteditable="true">50th Birthday</div>
    <div class="line caps"   id="l4" contenteditable="true">PARTY</div>
    <div class="line caps"   id="l5" contenteditable="true">SATURDAY, JUNE 25TH AT 2PM</div>
    <div class="line caps"   id="l6" contenteditable="true">THE BECERRA&#39;S RESIDENCE</div>
    <div class="line script" id="l7" contenteditable="true">123 Mountain View Road</div>
    <div class="line script" id="l8" contenteditable="true">12034 Rosa Street, Torrance, CA</div>
    <div class="line script" id="l9" contenteditable="true">Rsvp to Ashley at (144)667-7000</div>
  </div>

<script>
  const ids=['l1','l2','l3','l4','l5','l6','l7','l8','l9'];
  const KEY='talavera-invite-v2';
  const root=document.documentElement;
  const bgPick=document.getElementById('bgColor');
  const fgPick=document.getElementById('fgColor');
  const hue=document.getElementById('hue');
  const defaults={}; ids.forEach(id=>defaults[id]=document.getElementById(id).innerHTML);
  const defColors={bg:'#bb7737',accent:'#fbf6ec'};

  const PRESETS=[
    ['#bb7737','#fbf6ec'],
    ['#1f3a5f','#f5f1e6'],
    ['#234d36','#f7efe0'],
    ['#7d2247','#f7e9d9'],
    ['#2b2b2b','#d4af6a'],
    ['#9c3b1b','#f5e9d0'],
    ['#3b2a6b','#efe6d2'],
    ['#0d6b6b','#f2efe2']
  ];

  function hsl2hex(h,s,l){
    s/=100; l/=100;
    const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
    const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
    const to=x=>Math.round(255*x).toString(16).padStart(2,'0');
    return '#'+to(f(0))+to(f(8))+to(f(4));
  }
  function applyColors(bg,accent,save){
    if(save===undefined) save=true;
    root.style.setProperty('--bg',bg);
    root.style.setProperty('--accent',accent);
    bgPick.value=bg; fgPick.value=accent;
    if(save) persist();
  }

  const presetsEl=document.getElementById('presets');
  PRESETS.forEach(function(p){
    const bg=p[0], ac=p[1];
    const s=document.createElement('div'); s.className='swatch'; s.title=bg+' / '+ac;
    s.innerHTML='<i style="background:'+bg+'"></i><i style="background:'+ac+'"></i>';
    s.onclick=function(){ applyColors(bg,ac); };
    presetsEl.appendChild(s);
  });

  bgPick.oninput=function(){ applyColors(bgPick.value,fgPick.value); };
  fgPick.oninput=function(){ applyColors(bgPick.value,fgPick.value); };
  hue.oninput=function(){ applyColors(hsl2hex(+hue.value,50,46), hsl2hex(+hue.value,42,95)); };

  function persist(){
    const data={colors:{bg:bgPick.value,accent:fgPick.value},text:{}};
    ids.forEach(function(id){ data.text[id]=document.getElementById(id).innerHTML; });
    localStorage.setItem(KEY,JSON.stringify(data));
  }
  try{
    const s=JSON.parse(localStorage.getItem(KEY)||'{}');
    if(s.text) ids.forEach(function(id){ if(s.text[id]!=null) document.getElementById(id).innerHTML=s.text[id]; });
    if(s.colors) applyColors(s.colors.bg,s.colors.accent,false);
    else applyColors(defColors.bg,defColors.accent,false);
  }catch(e){ applyColors(defColors.bg,defColors.accent,false); }

  ids.forEach(function(id){
    const el=document.getElementById(id);
    el.addEventListener('input',persist);
    el.addEventListener('paste',function(e){ e.preventDefault();
      const t=(e.clipboardData||window.clipboardData).getData('text').replace(/\s+/g,' ').trim();
      document.execCommand('insertText',false,t); });
    el.addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();el.blur();} });
  });

  document.getElementById('resetBtn').onclick=function(){
    if(!confirm('Reset text and colors back to the original?'))return;
    ids.forEach(function(id){ document.getElementById(id).innerHTML=defaults[id]; });
    applyColors(defColors.bg,defColors.accent);
  };
  document.getElementById('printBtn').onclick=function(){ window.print(); };
</script>
</body>
</html>
